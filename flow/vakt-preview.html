<!doctype html>
<!-- Fristående FÖRHANDSVISNING av vakt-hjälten (peak premium-mockup). Levande radar (CSS-animerad).
     Inte den riktiga komponenten — en design-preview att öppna i mobil. URL: /flow/vakt-preview.html -->
<html lang="sv">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Arvo · Vakten (förhandsvisning)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Playfair+Display:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#050B09; --raised:#0A1411; --teal:#2BC4AC; --tealBright:#5DD6CA;
    --ink:#F4F9F7; --muted:rgba(236,244,241,.82); --faint:rgba(228,238,234,.60); --ghost:rgba(228,238,234,.38);
    --hair:rgba(255,255,255,.09);
    --mono:'JetBrains Mono',ui-monospace,monospace; --serif:'Playfair Display',Georgia,serif; --sans:'Inter',system-ui,sans-serif;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);font-family:var(--sans);color:var(--ink);padding:34px 20px 60px;-webkit-font-smoothing:antialiased}
  .wrap{max-width:640px;margin:0 auto}
  .cap{font-family:var(--mono);font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--ghost);margin:26px 6px 14px}
  .hero{position:relative;border:1px solid var(--hair);border-radius:26px;overflow:hidden;margin-bottom:8px;
    background:radial-gradient(820px 420px at 18% -6%,rgba(43,196,172,.11),transparent 58%),var(--raised)}
  .meta{display:flex;justify-content:space-between;align-items:center;padding:16px 24px;border-bottom:1px solid var(--hair);
    font-family:var(--mono);font-size:9.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--ghost);font-feature-settings:'tnum'}
  .body{display:flex;align-items:center;gap:26px;padding:28px 24px 26px}
  @media(max-width:520px){.body{flex-direction:column;align-items:flex-start;gap:18px}.meta span:first-child{max-width:60%}}
  .kick{display:flex;align-items:center;gap:9px;font-family:var(--mono);font-size:10px;letter-spacing:.26em;text-transform:uppercase;color:var(--ghost);margin-bottom:16px}
  .pulse{width:6px;height:6px;border-radius:50%;background:var(--teal);box-shadow:0 0 0 4px rgba(93,214,202,.15),0 0 12px var(--tealBright);animation:pulse 2.4s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
  .verdict{font-family:var(--serif);font-weight:500;font-size:clamp(26px,7vw,34px);line-height:1.16;letter-spacing:-.015em}
  .greet{color:var(--muted);font-weight:400}
  .tw{color:var(--tealBright)}
  .foot{display:flex;align-items:center;justify-content:space-between;gap:20px;padding:20px 24px;border-top:1px solid var(--hair);background:rgba(255,255,255,.012)}
  .ev{font-family:var(--mono);font-size:11px;letter-spacing:.01em;color:var(--faint);line-height:1.8;font-feature-settings:'tnum'}
  /* levande radar */
  .radar{flex-shrink:0}
  .sweep{transform-origin:60px 60px;animation:spin 4s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .ping{transform-origin:72px 30px;animation:ping 2.6s ease-out infinite}
  @keyframes ping{0%{transform:scale(.4);opacity:.5}80%,100%{transform:scale(1.5);opacity:0}}
  .blip{animation:blink 2.6s ease-in-out infinite}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.5}}
</style>
</head>
<body><div class="wrap">

  <div class="cap">Förhandsvisning · vaktens hjälte (ej skarp än) · levande radar</div>
</div>

<script>
  const T = { teal:'#2BC4AC', tealBright:'#5DD6CA', hair:'rgba(255,255,255,.09)' };
  function radar(){
    let ticks='';
    for(let i=0;i<24;i++){const a=i*15*Math.PI/180,r1=56,r2=i%6===0?50:53;
      ticks+=`<line x1="${60+r1*Math.cos(a)}" y1="${60+r1*Math.sin(a)}" x2="${60+r2*Math.cos(a)}" y2="${60+r2*Math.sin(a)}" stroke="${T.hair}" stroke-width="${i%6===0?1:.6}"/>`;}
    let trail='';[0,14,28,44,62].forEach((d,i)=>{const lead=-90,a0=(lead-d)*Math.PI/180,a1=(lead-d-16)*Math.PI/180,R=56;
      trail+=`<path d="M60 60 L${60+R*Math.cos(a0)} ${60+R*Math.sin(a0)} A${R} ${R} 0 0 0 ${60+R*Math.cos(a1)} ${60+R*Math.sin(a1)} Z" fill="${T.teal}" opacity="${.26-i*.05}"/>`;});
    return `<svg class="radar" width="120" height="120" viewBox="0 0 120 120">
      <defs><filter id="bl"><feGaussianBlur stdDeviation="1.8"/></filter></defs>
      <circle cx="60" cy="60" r="56" fill="none" stroke="${T.hair}"/><circle cx="60" cy="60" r="40" fill="none" stroke="${T.hair}"/>
      <circle cx="60" cy="60" r="24" fill="none" stroke="${T.hair}"/><circle cx="60" cy="60" r="10" fill="none" stroke="${T.hair}"/>
      <line x1="60" y1="4" x2="60" y2="116" stroke="${T.hair}" stroke-width=".5"/><line x1="4" y1="60" x2="116" y2="60" stroke="${T.hair}" stroke-width=".5"/>
      ${ticks}
      <g class="sweep">${trail}<line x1="60" y1="60" x2="60" y2="4" stroke="${T.tealBright}" stroke-width="1.2" opacity=".85"/></g>
      <circle class="ping" cx="72" cy="30" r="10" fill="none" stroke="${T.tealBright}" stroke-width=".8"/>
      <circle class="blip" cx="72" cy="30" r="3.4" fill="${T.tealBright}" filter="url(#bl)"/><circle cx="72" cy="30" r="2.1" fill="${T.tealBright}"/>
      <circle cx="40" cy="78" r="2.2" fill="${T.teal}" opacity=".45"/></svg>`;
  }
  function seal(){return `<svg width="72" height="72" viewBox="0 0 76 76">
    <circle cx="38" cy="38" r="36" fill="none" stroke="${T.hair}"/><circle cx="38" cy="38" r="29" fill="none" stroke="rgba(43,196,172,.35)" stroke-dasharray="1.5 3"/>
    <path d="M30 38 l6 6 12-13" fill="none" stroke="${T.teal}" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="38" y="62" text-anchor="middle" font-family="${'JetBrains Mono'}" font-size="6.4" letter-spacing="1.2" fill="rgba(228,238,234,.6)">03:14</text>
    <text x="38" y="18" text-anchor="middle" font-family="${'JetBrains Mono'}" font-size="6.4" letter-spacing="1.6" fill="rgba(228,238,234,.6)">VERIFIERAT</text></svg>`;}
  function hero(greet,verdict,ev){return `<div class="hero">
    <div class="meta"><span>Arvo · Konfidentiellt · Lynxeye AB</span><span>28 juni 2026 · 03:14</span></div>
    <div class="body">${radar()}<div style="flex:1;min-width:0">
      <div class="kick"><span class="pulse"></span>Vakten · nattens dom</div>
      <div class="verdict"><span class="greet">${greet}</span><br>${verdict}</div></div></div>
    <div class="foot"><div class="ev">${ev}</div>${seal()}</div></div>`;}
  const wrap = document.querySelector('.wrap');
  wrap.insertAdjacentHTML('afterbegin',
    `<div class="cap">Peak — lugnt läge</div>` +
    hero('God morgon.','Allt som rör er<br>är under <span class="tw">kontroll</span>.',
      '36 marknadskällor svepta · 47 prispunkter bevakade<br>14 prisrörelser i marknaden — <span class="tw">ingen rör era 11 avtal</span>.') +
    `<div class="cap">Peak — en rörelse rör er</div>` +
    hero('God morgon.','Två rörelser rör er.<br><span class="tw">Redan vägda</span> — vila.',
      '36 källor svepta · 14 prisrörelser fångade<br><span class="tw">2 träffar era leverantörer</span> · motdraget köat · ni gör inget'));
</script>
</body></html>
