name: Monthly Benchmark Calibration

on:
  schedule:
    - cron: '0 6 1 * *'   # Kl. 06:00 UTC den 1:e varje månad
  workflow_dispatch:

jobs:
  calibrate:
    name: P3.3 — Kalibrering av benchmarks mot faktiska utfall
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Migrate price database schema
        run: node scripts/migrate-price-db.mjs
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Aggregate invoice benchmarks (P4.2)
        run: node scripts/aggregate-invoice-benchmarks.mjs
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Ring 3 — Outcomes-kalibrering (prediktionsnoggrannhet per kategori)
        run: node scripts/calibrate-outcomes.mjs
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        continue-on-error: true

      - name: Run calibration
        run: node scripts/calibrate-benchmarks.mjs
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Open issue on drift detected
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[Kalibrering] Prediktionsavvikelse detekterad ${new Date().toISOString().slice(0,10)}`,
              body: `## Automatisk kalibrering flaggade avvikelse\n\nMindst en kategori har systematisk prediktionsavvikelse (>20% ratio).\n\n**Åtgärd:** Granska \`agents/recommender/branchindex.js\` och justera p25/p75-intervall.\n\nKör lokalt: \`node scripts/calibrate-benchmarks.mjs\`\n\n[Se workflow-körning](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
              labels: ['calibration', 'action-required'],
            });
