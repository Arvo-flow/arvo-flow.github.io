name: Probe Fraktjakt pricecalc

# Läser den dokumenterade price_calculation-API-sidan i klartext: finns publik test/demo-
# credential (sandbox-consignor)? + hittar registreringslänken. Endast manuell.
on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Probe Fraktjakt price_calculation doc
        run: node scripts/probe-fraktjakt-pricecalc.mjs
