name: Probe public price sources

# Engångssond: hämtar officiella öppna pris-API:er från runnern (obockerad egress)
# och dumpar svaren i loggen så vi kan skriva korrekta parsers. Endast manuell.
on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Probe
        run: node scripts/probe-public-source.mjs
