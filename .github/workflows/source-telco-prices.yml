name: Source telco prices
on:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  src:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Source
        run: |
          mkdir -p ops
          node scripts/source-telco-prices.mjs | tee ops/source-telco-prices.txt
      - name: Commit
        if: always()
        continue-on-error: true
        run: |
          git config user.email "bot@arvoflow.se"
          git config user.name "Arvo Src Bot"
          git pull --rebase origin main || true
          git add ops/source-telco-prices.txt
          git commit -m "ops: source-telco-prices [skip ci]" || echo "inget"
          git push origin HEAD:main || echo "push miss"
