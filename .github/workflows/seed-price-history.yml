name: Seed price history
on:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  seed:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - name: Seed verified price history
        run: |
          mkdir -p ops
          node scripts/seed-price-history.mjs | tee ops/seed-price-history.txt
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
      - name: Commit
        if: always()
        continue-on-error: true
        run: |
          git config user.email "bot@arvoflow.se"
          git config user.name "Arvo Seed Bot"
          git pull --rebase origin main || true
          git add ops/seed-price-history.txt
          git commit -m "ops: seed-price-history [skip ci]" || echo "inget"
          git push origin HEAD:main || echo "push miss"
