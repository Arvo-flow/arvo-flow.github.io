name: Verify price sources (factory)

# EN workflow för HELA verifierar-fabriken. Job-matrisen härleds ur registryt
# (scripts/verify.mjs --matrix) → lägg till en verifierare i lib/verifiers/registry.mjs så
# vaktas den automatiskt här. Playwright/Chromium installeras bara för källor med needsBrowser.
on:
  workflow_dispatch:
    inputs:
      id:
        description: 'Kör en enskild källa (id) eller "all"'
        default: 'all'
  schedule:
    - cron: '0 5 * * 1'   # måndagar 05:00 UTC

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.gen.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - id: gen
        run: echo "matrix=$(node scripts/verify.mjs --matrix)" >> "$GITHUB_OUTPUT"

  verify:
    needs: discover
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        source: ${{ fromJson(needs.discover.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      # Cachar Chromium-binären (~177 MB) mellan körningar → browser-jobben slipper ladda ner
      # den varje gång (det var den som throttlade/segade ner fabriken). Cache-miss → install
      # laddar ner och sparar; cache-hit → install hittar den och hoppar nedladdningen.
      - name: Cache Playwright-browser (endast browser-källor)
        if: ${{ matrix.source.needsBrowser }}
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}
      - name: Install Playwright + Chromium (endast browser-källor)
        if: ${{ matrix.source.needsBrowser }}
        run: |
          npm ci
          npm install playwright
          npx playwright install chromium --with-deps
      - name: Verifiera ${{ matrix.source.id }}
        run: node scripts/verify.mjs ${{ matrix.source.id }}
