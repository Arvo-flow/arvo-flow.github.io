name: Probe Adobe (stealth)

# Adobe Sond 2.0 — stealth-skrapning av Creative Cloud SEK-listpriser (förbi Akamai). Endast manuell.
on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Playwright + stealth
        run: |
          npm ci
          npm install playwright playwright-extra puppeteer-extra-plugin-stealth
          npx playwright install chromium --with-deps
      # Headful via xvfb — huvudlöst läge är lättast för Akamai att fingerprinta.
      - name: Probe Adobe (headful via xvfb)
        run: HEADFUL=1 xvfb-run -a node scripts/probe-adobe-stealth.mjs
