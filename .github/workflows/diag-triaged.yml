name: Diag triaged
on:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  diag:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - name: Diag
        run: |
          mkdir -p ops
          node scripts/diag-triaged.mjs | tee ops/diag-triaged.txt
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
      - name: Commit
        if: always()
        continue-on-error: true
        run: |
          git config user.email "bot@arvoflow.se"
          git config user.name "Arvo Diag Bot"
          git pull --rebase origin main || true
          git add ops/diag-triaged.txt
          git commit -m "ops: diag-triaged [skip ci]" || echo "inget"
          git push origin HEAD:main || echo "push miss"
