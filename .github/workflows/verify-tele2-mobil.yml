name: Verify Tele2 mobil prices

# Driftvakt: renderar Tele2:s företags-mobilsida med Playwright och jämför 24-mån-
# priserna mot mobil-ankaret i branchindex.js. Rött bygge = priset/planen har
# ändrats och måste bekräftas manuellt (vakten skriver aldrig själv). Kräver
# HTTP-egress + Chromium → körs här, ej i sandbox.
on:
  workflow_dispatch:
  schedule:
    - cron: '30 5 * * 1'   # måndagar 05:30 UTC (efter M365-vakten 05:00)

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Playwright + Chromium
        run: |
          npm ci
          npm install playwright
          npx playwright install chromium --with-deps
      - name: Verifiera Tele2-mobilpriser mot tele2.se
        run: node scripts/verify-tele2-mobil.mjs
