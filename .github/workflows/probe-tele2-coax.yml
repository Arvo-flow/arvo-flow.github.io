name: Probe Tele2 COAX

# Diagnos: vad returnerar Tele2:s bredbands-API nu för verifyAddresses (Max/COAX-larmet)?
# Ren fetch, ingen browser → snabbt. Endast manuell.
on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Probe Tele2 COAX
        run: node scripts/probe-tele2-coax.mjs
