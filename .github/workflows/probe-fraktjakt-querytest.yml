name: Probe Fraktjakt query_test

# Nitar kontraktet för Fraktjakts öppna API: läser API-manualen + anropar den dokumenterade
# test-endpointen /xml/query_test för att se exakt krav/svar. Endast manuell.
on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Probe Fraktjakt query_test
        run: node scripts/probe-fraktjakt-querytest.mjs
