name: Verify kortterminal rates

# Driftvakt: renderar kortterminal-leverantörssidor (Zettle, Stripe) och jämför
# transaktionsraterna mot branchindex.kortterminal.verifiedRates. Rött bygge = rate
# har ändrats och måste bekräftas. Kräver HTTP-egress + Chromium → körs här, ej i sandbox.
on:
  workflow_dispatch:
  schedule:
    - cron: '0 7 * * 1'   # måndagar 07:00 UTC

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Playwright + Chromium
        run: |
          npm ci
          npm install playwright
          npx playwright install chromium --with-deps
      - name: Verifiera kortterminal-rater
        run: node scripts/verify-kortterminal-rates.mjs
