name: Nightly AI Drift Monitor

# ── Layer 5 i Defense-in-Depth ────────────────────────────────────────────────
#
# Kör varje natt mot RIKTIGA Anthropic-modeller.
# Fångar upp tyst modell-drift: Haiku/Sonnet beter sig annorlunda utan att
# vi ändrat något i koden, eller vår system-prompt-ändring gav oväntad effekt.
#
# Kostnad: ~0,008 USD/natt (4 fixtures × Haiku + Sonnet, ej Opus).
#
# ── Initiera golden-data (första gången, görs från mobil) ────────────────────
# GitHub → Actions → "Nightly AI Drift Monitor" → Run workflow
# Kryssa i "Initiera golden-data" → Run
# Jobbet kör --update, committar test-snapshots/ och pushar automatiskt.
# ─────────────────────────────────────────────────────────────────────────────

on:
  schedule:
    - cron: '0 2 * * *'    # 02:00 UTC = 03:00/04:00 Stockholm (lågtrafik)
  workflow_dispatch:
    inputs:
      init:
        description: 'Initiera golden-data (kör --update och committa resultatet)'
        type: boolean
        required: false
        default: false
      fixtures:
        description: 'Fixtures att testa/initiera (kommaseparerat, tomt = standard 4)'
        required: false
        default: 'microsoft,telia,ricoh,bredband-1-baseline'

permissions:
  issues: write
  contents: write

jobs:
  drift-check:
    name: AI drift detection
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      # ── Läge 1: Initiera golden-data (manuell trigger med init=true) ──────────
      - name: Initialize golden data
        id: init
        if: github.event.inputs.init == 'true'
        run: |
          FIXTURES="${{ github.event.inputs.fixtures }}"
          FIXTURES="${FIXTURES:-microsoft,telia,ricoh,bredband-1-baseline}"
          echo "Initierar golden-data för: $FIXTURES"
          node scripts/ai-drift.mjs --update --fixtures="$FIXTURES"
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Commit golden data
        if: github.event.inputs.init == 'true'
        run: |
          git config user.email "bot@arvoflow.se"
          git config user.name "Arvo Drift Bot"
          git add test-snapshots/
          if ! git diff --staged --quiet; then
            git commit -m "init: golden snapshots for AI drift detection ($(date +%Y-%m-%d))"
            git push -u origin ${{ github.ref_name }}
            echo "✅ Golden-data committad och pushad till ${{ github.ref_name }}"
          else
            echo "ℹ️  Inga ändringar — golden-data var redan aktuell"
          fi

      # ── Läge 2: Nattlig drift-kontroll (schedule eller manuell utan init) ─────
      - name: Run AI drift check
        id: drift
        if: github.event.inputs.init != 'true'
        run: |
          FIXTURES="${{ github.event.inputs.fixtures }}"
          FIXTURES="${FIXTURES:-microsoft,telia,ricoh,bredband-1-baseline}"
          node scripts/ai-drift.mjs --fixtures="$FIXTURES"
        continue-on-error: true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Create or update drift issue
        if: github.event.inputs.init != 'true' && steps.drift.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const date = new Date().toLocaleString('sv-SE', {
              timeZone: 'Europe/Stockholm',
            });

            await github.rest.issues.createLabel({
              owner: context.repo.owner, repo: context.repo.repo,
              name: 'ai-drift',
              color: 'f59e0b',
              description: 'AI-modellens beteende avviker från golden snapshots',
            }).catch(e => {
              if (!e.message?.includes('already_exists') && e.status !== 422)
                console.log('Label-fel:', e.message);
            });

            const body = [
              '## ⚠️ AI Drift detekterad — ' + date,
              '',
              '> Categorize- eller recommend-modellen returnerar värden som avviker',
              '> från sparade golden snapshots på affärskritiska fält.',
              '',
              '| Logg | Länk |',
              '|------|------|',
              '| GitHub Actions-körning | ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }} |',
              '',
              '### Möjliga orsaker',
              '- Anthropic har uppdaterat Haiku 4.5 eller Sonnet 4.6',
              '- En system-prompt-ändring gav oväntad bieffekt',
              '',
              '### Åtgärd',
              '1. Granska Actions-loggen — identifiera vilket fält som driftade',
              '2. **Om korrekt nytt beteende:** kör "Init"-läget i Actions (kryssa i "Initiera golden-data")',
              '3. **Om modellfel:** rapportera till Anthropic',
              '',
              '---',
              '_Skapad av [Nightly AI Drift Monitor](.github/workflows/ai-drift.yml)_',
            ].join('\n');

            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              state: 'open', labels: 'ai-drift', per_page: 5,
            });

            if (existing.data.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: existing.data[0].number,
                body: '### Fortfarande aktiv — ' + date + '\n\nSe [Actions-körning](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) för detaljer.',
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo,
                title: '⚠️ AI Drift: ' + date,
                body, labels: ['ai-drift'],
              });
            }

      - name: Drift check passed
        if: github.event.inputs.init != 'true' && steps.drift.outcome == 'success'
        run: echo "✅ Ingen AI-drift — alla golden snapshots matchar"
