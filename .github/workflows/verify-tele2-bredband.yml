name: Verify Tele2 bredband prices

# Driftvakt: replayar Tele2:s adress→pris-API för fasta adresser och jämför mot de
# verifierade priserna i branchindex.bredband.tele2Verified. Rött vid drift. Direkt-fetch
# (ingen Playwright) → kräver bara HTTP-egress. Körs här, ej i sandbox.
on:
  workflow_dispatch:
  schedule:
    - cron: '0 8 * * 1'   # måndagar 08:00 UTC

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Verifiera Tele2-bredbandspriser mot adress-API
        run: node scripts/verify-tele2-bredband.mjs
