name: Verify Eurostat el bands

# Driftvakt: jämför el-marknadsgolvet (branchindex.el.eurostatBands) mot Eurostats
# nrg_pc_205 live. Rött bygge = bandvärde har drivit ELLER ny period publicerad och
# måste granskas innan den blir kundsynlig. Vakten skriver aldrig själv.
on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'   # måndagar 06:00 UTC

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Verifiera Eurostat el-band mot prisboken
        run: node scripts/verify-eurostat-el.mjs
