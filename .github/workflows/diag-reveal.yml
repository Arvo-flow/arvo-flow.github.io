name: Diag Avslöjandet (verifiera /api/reveal live)

# POSTar kända domäner till den LIVE-utlagda /api/reveal och skriver fynden till ops/.
# Bevisar hela kedjan (affärshjärnan + DNS + RDAP + crt.sh) utlagd på Vercel.
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  diag-reveal:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Hit live /api/reveal
        run: |
          mkdir -p ops
          node scripts/diag-reveal.mjs | tee ops/diag-reveal-live.txt
      - name: Commit
        if: always()
        continue-on-error: true
        run: |
          git config user.email "bot@arvoflow.se"
          git config user.name "Arvo Diag Bot"
          git pull --rebase origin main || true
          git add ops/diag-reveal-live.txt ops/diag-reveal-live.json
          git commit -m "ops: diag-reveal-live [skip ci]" || echo "inget"
          git push origin HEAD:main || echo "push miss"
