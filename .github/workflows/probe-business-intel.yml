name: Probe business intel
on:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Probe
        run: |
          mkdir -p ops
          node scripts/probe-business-intel.mjs | tee ops/probe-business-intel.txt
      - name: Commit
        if: always()
        continue-on-error: true
        run: |
          git config user.email "bot@arvoflow.se"
          git config user.name "Arvo Probe Bot"
          git pull --rebase origin main || true
          git add ops/probe-business-intel.txt
          git commit -m "ops: probe-business-intel [skip ci]" || echo "inget"
          git push origin HEAD:main || echo "push miss"
