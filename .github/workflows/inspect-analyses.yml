name: Inspect analyses

# Läs-bar detaljgranskning av de senaste analyserna (för ingest-test-utvärdering). Inga DB-skrivningar.
# Triggas manuellt ELLER via en push till ops/inspect.trigger (git-vägen, när GitHub-API/MCP är nere).
# Skriver resultatet till ops/inspect-result.txt och pushar tillbaka — så det kan läsas via git fetch.
on:
  workflow_dispatch:
    inputs:
      n:
        description: 'Antal senaste analyser att visa'
        required: false
        default: '30'
  push:
    paths:
      - 'ops/inspect.trigger'

permissions:
  contents: write

jobs:
  inspect:
    name: Granska analyser
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm ci
      - name: Inspect
        run: |
          mkdir -p ops
          node scripts/inspect-analyses.mjs "${{ inputs.n || '40' }}" | tee ops/inspect-result.txt
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
      - name: Commit result back (git-vägen)
        if: always()
        continue-on-error: true
        run: |
          git config user.email "bot@arvoflow.se"
          git config user.name "Arvo Inspect Bot"
          git add ops/inspect-result.txt
          # Result-filen ligger på ANNAN path än triggern → ingen loop. [skip ci] som extra bälte.
          git commit -m "ops: inspect-resultat [skip ci]" || echo "inget att committa"
          git push origin HEAD:main || echo "push misslyckades"
