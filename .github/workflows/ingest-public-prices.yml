name: Ingest public-sector prices

# Hämtar offentlig sektors verkliga kontraktspriser ur svensk öppen data och
# skriver till public_price_points. Körs här (ej i sandbox) eftersom HTTP-egress
# krävs. Manuell trigger + veckovis.
on:
  workflow_dispatch:
    inputs:
      source:
        description: 'Källa (all | ramavtal-stat,reskontra-kommun | --sample)'
        default: 'all'
  schedule:
    - cron: '0 4 * * 1'   # måndagar 04:00 UTC

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci --omit=dev || npm install --omit=dev
      - name: Migrera tabell
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: node scripts/migrate-public-prices.mjs
      - name: Ingest curated seed (verifierad data)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: node scripts/ingest-public-prices.mjs --seed
      - name: Ingest live (adaptrar)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: node scripts/ingest-public-prices.mjs --source=${{ github.event.inputs.source || 'all' }}
