name: Setup Price Database (run once)

# Engångsworkflow: skapar pristabeller och seeder med alla kända leverantörspriser.
# Kör manuellt från GitHub Actions → "Run workflow".
# Idempotent — säkert att köra flera gånger.

on:
  workflow_dispatch:

jobs:
  setup:
    name: Migrate + Seed price database
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create price database schema
        run: node scripts/migrate-price-db.mjs
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Seed with all known supplier prices
        run: node scripts/seed-price-db.mjs
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Aggregate invoice benchmarks
        run: node scripts/aggregate-invoice-benchmarks.mjs
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
