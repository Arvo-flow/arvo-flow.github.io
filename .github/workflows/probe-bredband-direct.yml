name: Probe bredband direct

# Snabb direkt-fetch-sond mot Tele2:s feasibility-API (ingen Playwright/Chromium).
on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Probe bredband direct
        run: node scripts/probe-bredband-direct.mjs
