name: Probe anchors (bredband + kortterminal)

# Engångssond: renderar bredband- + kortterminal-leverantörssidor med Playwright
# och dumpar pris-/avgiftskontext så vi kan skriva deterministiska vakter. Manuell.
on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Playwright + Chromium
        run: |
          npm ci
          npm install playwright
          npx playwright install chromium --with-deps
      - name: Probe anchors
        run: node scripts/probe-anchors.mjs
