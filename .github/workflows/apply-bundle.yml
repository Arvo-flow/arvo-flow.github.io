name: Apply UI redesign via bundle
on:
  push:
    branches: [claude/build-arvo-os-app-8Ybsd]
    paths: ['_patches/bundle-trigger.txt']
jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/build-arvo-os-app-8Ybsd
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      - name: Decode bundle and apply
        run: |
          cat _patches/changes.bundle.b64 | base64 -d > /tmp/changes.bundle
          git bundle verify /tmp/changes.bundle
          git fetch /tmp/changes.bundle HEAD
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git cherry-pick FETCH_HEAD --no-edit
      - name: Clean up artifacts
        run: |
          rm -rf _patches
          rm -f .github/workflows/apply-ui-patch.yml
          rm -f .github/workflows/apply-bundle.yml
          git add -A
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "Clean up patch transport artifacts"
          git push
