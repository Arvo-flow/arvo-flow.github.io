name: Probe Fraktjakt public quote

# Runda 3: knäcker Fraktjakts PUBLIKA anonyma quote-flöde (ingen nyckel, inget org.nr) —
# form-kontrakt + CSRF + pris-bärande svar. Vägen till riktig fraktdata idag. Endast manuell.
on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Playwright + Chromium
        run: |
          npm ci
          npm install playwright
          npx playwright install chromium --with-deps
      - name: Probe Fraktjakt public quote
        run: node scripts/probe-fraktjakt-public.mjs
