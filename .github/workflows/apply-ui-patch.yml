name: Apply UI redesign patch
on:
  push:
    branches: [claude/build-arvo-os-app-8Ybsd]
    paths: ['_patches/chunk_03.txt']
jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/build-arvo-os-app-8Ybsd
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Combine and apply patch
        run: |
          cd _patches
          cat chunk_01.txt chunk_02.txt chunk_03.txt > combined.b64
          base64 -d combined.b64 > ui-redesign.patch
          cd ..
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git am _patches/ui-redesign.patch
          rm -rf _patches .github/workflows/apply-ui-patch.yml
          git add -A
          git commit -m "Clean up UI patch transport artifacts"
          git push
