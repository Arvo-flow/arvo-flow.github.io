name: Fraktjakt live test

# Engångs live-validering: tar consignor_id + key som transienta inputs (committas ALDRIG)
# och kör fraktjakt-verifieraren mot det skarpa öppna API:t. Skriver ut bärar­priser, ALDRIG
# nyckeln. Permanent drift sker via repo-secrets (verify-sources.yml), inte denna.
on:
  workflow_dispatch:
    inputs:
      consignor_id:
        description: 'Fraktjakt consignor id'
        required: true
      key:
        description: 'Fraktjakt key'
        required: true

jobs:
  livetest:
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Live quote via fraktjakt-verifieraren
        env:
          FRAKTJAKT_CONSIGNOR_ID: ${{ inputs.consignor_id }}
          FRAKTJAKT_KEY: ${{ inputs.key }}
        run: node scripts/verify.mjs fraktjakt
