name: Probe Adobe VAT (team)

# Riktad recon: är Adobes team-priser (985/381) inkl eller exkl moms? Avgör B2B-ankaret. Endast manuell.
on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Playwright + stealth
        run: |
          npm ci
          npm install playwright playwright-extra puppeteer-extra-plugin-stealth
          npx playwright install chromium --with-deps
      - name: Probe Adobe VAT (headful via xvfb)
        run: HEADFUL=1 xvfb-run -a node scripts/probe-adobe-vat.mjs
