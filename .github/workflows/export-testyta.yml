name: Export testyta

# Dumpar testytans analyser (inkl health_score) till ops/testyta-rows.json så kontorsbilden
# kan renderas ur VERKLIG data.
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  export:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - name: Export
        run: |
          mkdir -p ops
          node scripts/export-testyta.mjs > ops/testyta-rows.json
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
      - name: Commit
        if: always()
        continue-on-error: true
        run: |
          git config user.email "bot@arvoflow.se"
          git config user.name "Arvo Export Bot"
          git pull --rebase origin main || true
          git add ops/testyta-rows.json
          git commit -m "ops: testyta-rows [skip ci]" || echo "inget att committa"
          git push origin HEAD:main || echo "push misslyckades"
