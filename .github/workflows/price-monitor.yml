name: Nightly Price Monitor

on:
  schedule:
    - cron: '0 21 * * *'
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/price-monitor.yml'

permissions:
  issues: write
  contents: write
  pull-requests: write

jobs:
  monitor:
    name: Check benchmark prices
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          npm ci
          npm install playwright
          npx playwright install chromium --with-deps

      - name: Run price monitor
        id: monitor
        run: node scripts/price-monitor.mjs
        continue-on-error: true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: price-monitor-report
          path: /tmp/price-monitor-report.json
          retention-days: 90

      - name: Apply proposals and create branch
        id: apply
        if: steps.monitor.outcome == 'failure'
        run: |
          DATE=$(date +%Y-%m-%d)
          BRANCH="price-update/${DATE}"

          git config user.email "bot@arvoflow.se"
          git config user.name "Arvo Price Bot"
          git checkout -b "${BRANCH}"

          node scripts/apply-price-proposals.mjs

          git add scripts/price-monitor.mjs agents/recommender/branchindex.js

          if ! git diff --staged --quiet; then
            git commit -m "fix(benchmark): auto-detekterade prisändringar ${DATE}"
            git push -u origin "${BRANCH}"
            echo "has_changes=true"  >> "$GITHUB_OUTPUT"
            echo "branch=${BRANCH}"  >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "branch="           >> "$GITHUB_OUTPUT"
          fi

      - name: Create Pull Request
        id: create_pr
        if: steps.monitor.outcome == 'failure' && steps.apply.outputs.has_changes == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = JSON.parse(fs.readFileSync('/tmp/price-monitor-report.json', 'utf8'));
            let summary = { applied: [], skipped: [] };
            try { summary = JSON.parse(fs.readFileSync('/tmp/apply-summary.json', 'utf8')); } catch {}

            const branch = '${{ steps.apply.outputs.branch }}';
            const date = new Date().toLocaleDateString('sv-SE', {
              timeZone: 'Europe/Stockholm', year: 'numeric', month: '2-digit', day: '2-digit',
            });

            const alertRows = (report.alerts || []).map(a => {
              const h = a.haiku || {};
              const wasApplied = summary.applied.some(ap => ap.oldCheck === a.check && ap.supplier === a.supplier);
              return '| ' + [a.category, a.supplier, a.check,
                h.extractedPrice || '(okänd)', h.confidence != null ? Math.round(h.confidence * 100) + ' %' : '-',
                wasApplied ? 'Auto-föreslagen' : 'Manuell koll', '[Verifiera](' + a.url + ')'].join(' | ') + ' |';
            }).join('\n');

            const body = [
              '## Prisuppdatering ' + date,
              '', '> Granska, verifiera mot leverantör, merga om korrekt.',
              '', '| Kategori | Leverantör | Gammalt | Nytt | Säkerhet | Status | Länk |',
              '|---|---|---|---|---|---|---|', alertRows, '',
              '- [ ] Verifiera priser', '- [ ] Kontrollera att ej kampanjpris', '- [ ] Merga om korrekt',
            ].join('\n');

            const pr = await github.rest.pulls.create({
              owner: context.repo.owner, repo: context.repo.repo,
              title: 'Prisuppdatering ' + date,
              head: branch, base: 'main', body,
            });
            core.setOutput('pr_url', pr.data.html_url);
            core.setOutput('pr_number', String(pr.data.number));

      - name: Send alert email
        if: steps.monitor.outcome == 'failure' && steps.apply.outputs.has_changes == 'true'
        run: node scripts/send-alert-email.mjs --pr-url "${{ steps.create_pr.outputs.pr_url }}"
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}

      - name: Create issue if no auto-fix
        if: steps.monitor.outcome == 'failure' && steps.apply.outputs.has_changes != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = JSON.parse(fs.readFileSync('/tmp/price-monitor-report.json', 'utf8'));
            const date = new Date().toLocaleDateString('sv-SE', { timeZone: 'Europe/Stockholm' });
            try {
              await github.rest.issues.createLabel({ owner: context.repo.owner, repo: context.repo.repo,
                name: 'price-alert', color: 'e11d48', description: 'Prisvarning' });
            } catch {}
            const rows = (report.alerts || []).map(a =>
              '| ' + [a.category, a.supplier, a.check,
                (a.haiku || {}).extractedPrice || '-', '[Kontrollera](' + a.url + ')'].join(' | ') + ' |'
            ).join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner, repo: context.repo.repo,
              title: 'Prisvarning ' + date,
              body: '| Kategori | Leverantör | Pris | Nytt | Länk |\n|---|---|---|---|---|\n' + rows,
              labels: ['price-alert'],
            });

      - name: All checks passed
        if: steps.monitor.outcome == 'success'
        run: echo "All checks passed"
