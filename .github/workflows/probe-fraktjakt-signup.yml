name: Probe Fraktjakt signup

# Verifierar den legitima snabba vägen till en API-nyckel (gratis privatkonto, inget org.nr,
# test/sandbox-läge) genom att läsa publika signup-/API-doc-sidor. Endast manuell.
on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Probe Fraktjakt signup + API doc
        run: node scripts/probe-fraktjakt-signup.mjs
