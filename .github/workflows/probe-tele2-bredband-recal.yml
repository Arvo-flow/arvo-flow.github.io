name: Probe Tele2 bredband recal

# Nätverksfångar Tele2:s nuvarande broadband/products-anrop (nya entryId/infrastructure).
on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Playwright + Chromium
        run: |
          npm ci
          npm install playwright
          npx playwright install chromium --with-deps
      - name: Probe Tele2 bredband recal
        run: node scripts/probe-tele2-bredband-recal.mjs
